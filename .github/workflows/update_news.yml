name: Crypto News Auto-Update

on:
  schedule:
    # Se ejecuta cada 6 horas (puedes ajustarlo)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde el botón "Actions" de GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest

    env:
      # Usamos tu base de datos REAL de Neon para que las noticias aparezcan en la web
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "False"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psycopg2-binary
    
    - name: Run Tests
      env:
        # Forzamos SQLite solo para los tests, evitando el error de Neon
        DATABASE_URL: sqlite:///db.sqlite3
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        DEBUG: "True"
      run: |
        python manage.py test tracker.tests

    - name: Run Crypto Bot
      run: |
        # Asumiendo que tu comando se llama 'run_news_bot'
        # Si el nombre es distinto, cámbialo aquí
        python manage.py run_news_bot

