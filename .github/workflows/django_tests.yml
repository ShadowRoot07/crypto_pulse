name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Definimos variables de entorno para que Django no explote
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: sqlite:///db.sqlite3 # Usamos SQLite para tests rápidos
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "True"

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install django django-environ requests beautifulsoup4 groq gunicorn psycopg2-binary
        # Si usas un requirements.txt, usa: pip install -r requirements.txt

    - name: Run Migrations
      run: |
        python manage.py makemigrations
        python manage.py migrate

    - name: Run System Check
      run: |
        python manage.py check

    - name: Run Tests
      run: |
        python manage.py test

