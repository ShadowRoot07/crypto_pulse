name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: sqlite:///db.sqlite3 
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "True"
      # Forzamos Node 24 para evitar los avisos de depreciación que viste en el log
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Instalamos directamente desde tu archivo de requerimientos
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Aseguramos psycopg2-binary para evitar fallos de compilación en el runner
        pip install psycopg2-binary

    - name: Run Migrations
      run: |
        python manage.py makemigrations
        python manage.py migrate

    - name: Run System Check
      run: |
        python manage.py check

    - name: Run Tests
      run: |
        # Solo ejecutará tests si tienes archivos test.py creados
        python manage.py test

