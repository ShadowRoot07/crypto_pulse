{% extends 'base.html' %}
{% block title %}ACCESS_DENIED | Authentication Required{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 glass p-8 border-t-4 border-cyan-500">
    <h2 class="text-2xl font-bold mb-6 text-center tracking-tighter italic">CREDENTIAL_INPUT</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="text-xs uppercase text-cyan-700">Username_</label>
            {{ form.username }}
            </div>
        <div>
            <label class="text-xs uppercase text-cyan-700">Password_</label>
            {{ form.password }}
        </div>
        <button type="submit" class="w-full bg-cyan-600 text-black font-bold py-2 cyber-btn hover:bg-cyan-400 transition">
            INIT_SESSION
        </button>
    </form>
</div>
{% endblock %}
