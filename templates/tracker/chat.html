{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto h-[80vh] flex flex-col glass p-4 border-b-4 border-cyan-500">
    <div id="chat-window" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 scroll-smooth">
        {% for msg in messages reversed %}
        <div class="{% if msg.sender_type == 'USER' %}text-right{% else %}text-left{% endif %}">
            <span class="text-[10px] uppercase opacity-40 font-mono">
                [{{ msg.timestamp|date:"H:i" }}] {{ msg.sender_type }}
            </span>
            <div class="inline-block max-w-[80%] p-3 text-sm 
                {% if msg.sender_type == 'USER' %}
                bg-cyan-900/30 border border-cyan-500 text-cyan-100 rounded-l-lg rounded-tr-lg
                {% else %}
                bg-fuchsia-900/30 border border-fuchsia-500 text-fuchsia-100 rounded-r-lg rounded-tl-lg
                {% endif %} shadow-[0_0_10px_rgba(34,211,238,0.1)]">
                {{ msg.message|linebreaksbr }}
            </div>
        </div>
        {% endfor %}
    </div>

    <form method="POST" class="flex gap-2 border-t border-cyan-900/50 pt-4">
        {% csrf_token %}
        <input type="text" name="message" autocomplete="off" placeholder="Escribe un mensaje al sistema..." 
               class="flex-1 bg-black/60 border border-cyan-900 p-3 text-sm outline-none focus:border-cyan-400 text-cyan-100 placeholder-cyan-900">
        <button type="submit" class="bg-cyan-600 text-black px-6 font-bold cyber-btn hover:bg-cyan-400 transition-colors">
            SEND
        </button>
    </form>
</div>

<script>
    // Función para bajar el scroll al fondo
    const scrollToBottom = () => {
        const chatWindow = document.getElementById('chat-window');
        chatWindow.scrollTop = chatWindow.scrollHeight;
    };

    // Ejecutar al cargar la página
    window.onload = scrollToBottom;
</script>
{% endblock %}
