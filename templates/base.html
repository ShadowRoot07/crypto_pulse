{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Shadow Crypto</title>
    
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .neon-border { border: 1px solid #22d3ee; box-shadow: 0 0 10px #0891b2; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(34, 211, 238, 0.2); }
        .cyber-btn { clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0891b2; }

        /* Efecto de escaneo sutil */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(34, 211, 238, 0.1);
            position: fixed;
            top: 0;
            z-index: 100;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="text-cyan-400 min-h-screen">
    <div class="scanline"></div>

    <nav class="glass sticky top-0 z-50 border-b border-cyan-500/30 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500">
                SHADOW_PULSE <span class="text-xs opacity-50">v1.0.4</span>
            </h1>

            <div class="relative group">
                <button class="neon-border px-4 py-1 text-sm uppercase tracking-tighter hover:bg-cyan-500 hover:text-black transition">
                    System_Menu ▼
                </button>
                <div class="absolute right-0 mt-2 w-48 glass hidden group-hover:block border border-cyan-500/50 shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                    <a href="{% url 'dashboard' %}" class="block px-4 py-2 hover:bg-cyan-500/20">Dashboard</a>
                    <a href="{% url 'chat_bot' %}" class="block px-4 py-2 hover:bg-cyan-500/20">Chat Interact</a>
                    <a href="{% url 'wiki_view' %}" class="block px-4 py-2 hover:bg-cyan-500/20 border-t border-cyan-900">Wiki Crypto</a>
                    <form action="{% url 'logout' %}" method="post" class="block">
                        {% csrf_token %}
                        <button type="submit" class="w-full text-left px-4 py-2 text-red-400 hover:bg-red-500/20">Disconnect</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-10 p-6 border-t border-cyan-900 text-center text-[10px] opacity-40 uppercase tracking-[0.2em]">
        &copy; 2026 ShadowRoot07 // Cryptopulse Terminal // Secure_Connection: Established
    </footer>
</body>
</html>
